<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belge Doğrulama (Noter) Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-file-shield"></i>
                <h1>Belge Doğrulama Ağ Geçidi</h1>
            </div>
            <p class="subtitle">Blockchain tabanlı dijital noter sisteminiz. Belgelerinizin orijinalliğini güvence altına alın.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="upload-tab"><i class="fa-solid fa-cloud-arrow-up"></i> Belge Yükle / Onayla</button>
            <button class="tab-btn" data-tab="verify-tab"><i class="fa-solid fa-magnifying-glass-chart"></i> Belge Doğrula</button>
        </div>

        <div class="panels-container">
            <!-- Upload Panel -->
            <div id="upload-tab" class="panel active">
                <div class="upload-area" id="upload-drop-zone">
                    <i class="fa-solid fa-file-arrow-up upload-icon"></i>
                    <h3>Belgeyi Buraya Sürükleyin</h3>
                    <p>veya bilgisayarınızdan seçin (PDF, JPG, PNG)</p>
                    <input type="file" id="file-upload" hidden>
                    <button class="btn-primary" onclick="document.getElementById('file-upload').click()">Dosya Seç</button>
                </div>
                
                <div id="upload-details" class="file-details hidden">
                    <div class="file-info">
                        <i class="fa-solid fa-file-pdf"></i>
                        <span id="upload-filename">belge.pdf</span>
                    </div>
                    <button id="btn-register" class="btn-gradient">
                        <i class="fa-brands fa-ethereum"></i> Blockchain'e Kaydet
                    </button>
                </div>

                <div id="upload-status" class="status-box hidden"></div>
            </div>

            <!-- Verify Panel -->
            <div id="verify-tab" class="panel">
                <div class="upload-area" id="verify-drop-zone">
                    <i class="fa-solid fa-file-circle-check upload-icon"></i>
                    <h3>Doğrulanacak Belgeyi Yükleyin</h3>
                    <input type="file" id="file-verify" hidden>
                    <button class="btn-primary" onclick="document.getElementById('file-verify').click()">Dosya Seç</button>
                </div>
                
                <div id="verify-details" class="file-details hidden">
                    <div class="file-info">
                        <i class="fa-solid fa-file-signature"></i>
                        <span id="verify-filename">belge.pdf</span>
                    </div>
                    <button id="btn-verify" class="btn-gradient">
                        <i class="fa-solid fa-shield-halved"></i> Belgeyi Doğrula
                    </button>
                </div>

                <div id="verify-status" class="status-box hidden"></div>
            </div>
        </div>
    </div>

    <!-- Ethers.js for Web3 Integration -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.6.1/ethers.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
